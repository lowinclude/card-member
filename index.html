<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Помощник для запоминания карточек</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #121212;
        color: #eee;
        text-align: center;
        height: 100vh;
        align-content: center;
        justify-content: center;
        overflow: hidden;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(10, 100px);
        grid-template-rows: repeat(6, 90px);
        gap: 10px;
        justify-content: center;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .card {
        width: 100px;
        height: 90px;
        background: #1e1e1e;
        border: 2px solid #333;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: relative;
        overflow: visible;
        color: #aaa;
        transition: opacity 0.3s, border 0.3s;
      }
      .card.transparent {
        opacity: 0;
      }
      .card img {
        max-width: 90%;
        max-height: 90%;
      }
      .card.matched {
        border: 2px solid #00ff00;
      }
      .selector {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #222;
        padding: 20px;
        border: 1px solid #444;
        border-radius: 8px;
        display: grid;
        grid-template-columns: repeat(5, 100px);
        gap: 10px;
        z-index: 1000;
      }

      .selector img {
        width: 100px;
        height: 100px;
        object-fit: contain;
        cursor: pointer;
        background: #111;
        border-radius: 6px;
        padding: 4px;
      }
      .selector img:hover {
        background: #444;
      }
    </style>
  </head>
  <body>
    <div class="grid" id="grid"></div>

    <audio id="matchSound" src="match.mp3" preload="auto"></audio>

    <script>
      const sound = document.getElementById("matchSound");
      sound.volume = 0.3;

      const grid = document.getElementById("grid");
      const totalCards = 60;
      const items = [
        "img/1.png",
        "img/2.png",
        "img/3.png",
        "img/4.png",
        "img/5.png",
        "img/6.png",
        "img/7.png",
        "img/8.png",
        "img/9.png",
        "img/10.png",
        "img/11.png",
        // "img/12.png",
        "img/13.png",
        "img/14.png",
        "img/15.png",
        "img/16.png",
        "img/17.png",
        "img/18.png",
        "img/19.png",
        "img/20.png",
        "img/21.png",
        "img/22.png",
        "img/23.png",
        "img/24.png",
        "img/25.png",
        "img/26.png",
        "img/27.png",
        "img/28.png",
        "img/29.png",
        "img/30.png",
        "img/31.png",
      ];

      let currentSelector = null;

      for (let i = 0; i < totalCards; i++) {
        const card = document.createElement("div");
        card.className = "card";
        card.textContent = "?";

        card.addEventListener("click", (e) => {
          e.stopPropagation();
          showSelector(card);
        });

        card.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          card.classList.toggle("transparent");
        });

        grid.appendChild(card);
      }

      function showSelector(card) {
        if (currentSelector) currentSelector.remove();

        const selector = document.createElement("div");
        selector.className = "selector";

        items.forEach((src) => {
          const img = document.createElement("img");
          img.src = src;
          img.addEventListener("click", () => {
            card.innerHTML = "";
            const chosen = document.createElement("img");
            chosen.src = src;
            card.appendChild(chosen);

            checkPairs(src, card);

            selector.remove();
            currentSelector = null;
          });
          selector.appendChild(img);
        });

        document.body.appendChild(selector);
        currentSelector = selector;
      }

      function checkPairs(src, card) {
        const cards = document.querySelectorAll(".card img");
        const matches = [];

        cards.forEach((img) => {
          if (img.src.includes(src)) {
            matches.push(img.parentElement);
          }
        });

        if (matches.length >= 2) {
          matches.forEach((c) => c.classList.add("matched"));
          document.getElementById("matchSound").play();
        }
      }

      document.addEventListener("click", (e) => {
        if (currentSelector && !currentSelector.contains(e.target)) {
          currentSelector.remove();
          currentSelector = null;
        }
      });
    </script>
  </body>
</html>
